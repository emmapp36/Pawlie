services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pawlie-postgres
    environment:
      POSTGRES_USER: pawlie
      POSTGRES_PASSWORD: pawlie
      POSTGRES_DB: pawlie
    ports:
      - "5432:5432"
    volumes:
      - ./db/init:/docker-entrypoint-initdb.d:ro
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pawlie"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
